; Story 5.2 — overrides PHP para upload de Documento via FileStorageContract.
;
; PHP defaults (2M / 8M / 128M) são insuficientes para peças processuais
; brasileiras (PDFs assinados regulares 50-200MB). Limite server-side da
; aplicação Togare é configurável via env var TOGARE_MAX_DOCUMENT_SIZE_MB
; (default 200). Estes overrides cobrem com folga proporcional.
;
; Ajuste em produção:
;  - Cliente quer aceitar até 500MB → TOGARE_MAX_DOCUMENT_SIZE_MB=500 +
;    upload_max_filesize=510M + post_max_size=520M + memory_limit=512M.
;  - Cliente quer 100MB → TOGARE_MAX_DOCUMENT_SIZE_MB=100 + 110M / 120M / 256M.

upload_max_filesize = 210M
post_max_size = 300M
memory_limit = 512M
max_execution_time = 120
